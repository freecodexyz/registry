services:
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      CONTRACT_ADDRESS:       ${CONTRACT_ADDRESS}
      LAUNCHER_ADDRESS:       ${LAUNCHER_ADDRESS}
      V4_POOL_MANAGER:        ${V4_POOL_MANAGER}
      STATE_VIEW:             ${STATE_VIEW:-0xa3c0c9b65bad0b08107aa264b0f3db444b867a71}
      CHAIN_ID:               ${CHAIN_ID:-8453}
      GATE_TOKEN_ADDRESS:     ${GATE_TOKEN_ADDRESS}
      GATE_TOKEN_MIN_BALANCE: ${GATE_TOKEN_MIN_BALANCE}
      RPC_URL:                ${RPC_URL:-https://mainnet.base.org}
      SIWE_DOMAIN:            ${SIWE_DOMAIN:-}
      SESSION_KEY:            ${SESSION_KEY:-}
      SESSION_COOKIE_SECURE:  ${SESSION_COOKIE_SECURE:-}
      GITHUB_TOKEN:           ${GITHUB_TOKEN}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS:-}
      UNISWAP_API_KEY:        ${UNISWAP_API_KEY:-}
      UNISWAP_API_URL:        ${UNISWAP_API_URL:-https://trade-api.gateway.uniswap.org/v1}
      DB_PATH:                /data/registry.db
      INDEXER:                "false"
      EVENTS_SOCKET_LISTEN_HOST: 0.0.0.0
      EVENTS_SOCKET_PORT:     ${EVENTS_SOCKET_PORT:-3055}
      SWAP_ASSETS_FILE_PATH:   ${SWAP_ASSETS_FILE_PATH:-}
    volumes:  ["registry-data:/data"]
    expose:   ["${EVENTS_SOCKET_PORT:-3055}"]
    ports:    ["${API_PUBLISHED_PORT:-3000}:3000"]
  
  indexer:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      CONTRACT_ADDRESS:       ${CONTRACT_ADDRESS}
      LAUNCHER_ADDRESS:       ${LAUNCHER_ADDRESS}
      V4_POOL_MANAGER:        ${V4_POOL_MANAGER}
      STATE_VIEW:             ${STATE_VIEW:-0xa3c0c9b65bad0b08107aa264b0f3db444b867a71}
      CHAIN_ID:               ${CHAIN_ID:-8453}
      GATE_TOKEN_ADDRESS:     ${GATE_TOKEN_ADDRESS}
      GATE_TOKEN_MIN_BALANCE: ${GATE_TOKEN_MIN_BALANCE}
      RPC_URL:                ${RPC_URL:-https://mainnet.base.org}
      SIWE_DOMAIN:            ${SIWE_DOMAIN:-}
      SESSION_KEY:            ${SESSION_KEY:-}
      SESSION_COOKIE_SECURE:  ${SESSION_COOKIE_SECURE:-}
      GITHUB_TOKEN:           ${GITHUB_TOKEN}
      UNISWAP_API_KEY:        ${UNISWAP_API_KEY:-}
      UNISWAP_API_URL:        ${UNISWAP_API_URL:-https://trade-api.gateway.uniswap.org/v1}
      DB_PATH:                /data/registry.db
      INDEXER:                "true" 
      EVENTS_SOCKET_HOST:     api
      EVENTS_SOCKET_PORT:     ${EVENTS_SOCKET_PORT:-3055}
      SWAP_ASSETS_FILE_PATH:   ${SWAP_ASSETS_FILE_PATH:-}
    volumes:  ["registry-data:/data"]
    depends_on: [api]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-}
    environment: { VITE_API_URL: "http://localhost:3000" }
    ports: ["${WEB_PUBLISHED_PORT:-5173}:80"]

volumes:
  registry-data:
